<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FM • Radio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Space+Grotesk:wght@500;600&amp;display=swap');
        
        :root {
            --primary: #6366f1;
        }
        
        body {
            font-family: 'Inter', system_ui, sans-serif;
        }
        
        .logo-font {
            font-family: 'Space Grotesk', 'Inter', sans-serif;
            font-weight: 600;
            letter-spacing: -2px;
        }

        .station-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .station-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
        }

        .station-card.active {
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .radio-wave {
            animation: radio-wave 2s infinite ease-in-out;
        }

        .player-glow {
            box-shadow: 0 0 25px rgba(99, 102, 241, 0.15);
        }

        .station-frequency {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 600;
            letter-spacing: -1px;
        }

        .modern-shadow {
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1),
                        0 4px 6px -4px rgb(0 0 0 / 0.1);
        }

        .audio-visualizer {
            height: 60px;
            display: flex;
            align-items: flex-end;
            gap: 4px;
        }

        .bar {
            width: 5px;
            background: linear-gradient(to top, #6366f1, #a5b4fc);
            border-radius: 9999px;
            transition: height 0.1s ease;
        }

        .nav-active {
            color: white;
            background-color: #6366f1;
        }
    </style>
</head>

        let currentStation = null;
        let isPlaying = false;
        let audio = null;
        let audioContext = null;
        let analyser = null;
        let animationFrame = null;

        // Initialize Audio
        function initAudio() {
            audio = document.getElementById('audio-player');
            
            // Volume control
            const volumeSlider = document.getElementById('volume-slider');
            const volumeValue = document.getElementById('volume-value');
            
            volumeSlider.addEventListener('input', () => {
                audio.volume = volumeSlider.value / 100;
                volumeValue.textContent = volumeSlider.value;
            });

            // Audio event listeners
            audio.addEventListener('playing', () => {
                isPlaying = true;
                updatePlayButton();
                startVisualizer();
            });

            audio.addEventListener('pause', () => {
                isPlaying = false;
                updatePlayButton();
                stopVisualizer();
            });

            audio.addEventListener('ended', () => {
                isPlaying = false;
                updatePlayButton();
                stopVisualizer();
            });

            audio.addEventListener('error', (e) => {
                console.error("Audio error:", e);
                alert("Unable to play this station. The stream might be temporarily unavailable.");
                stopRadio();
            });
        }

        // Render Stations Grid
        function renderStations(filteredStations = stations) {
            const grid = document.getElementById('stations-grid');
            grid.innerHTML = '';

            filteredStations.forEach(station => {
                const isActive = currentStation && currentStation.id === station.id;
                
                const cardHTML = `
                    <div onclick="playStation(${station.id})" 
                         class="station-card bg-zinc-900 border border-zinc-800 hover:border-zinc-700 rounded-3xl p-5 cursor-pointer ${isActive ? 'active border-indigo-500' : ''}">
                        
                        <div class="flex justify-between items-start mb-4">
                            <div class="flex items-center gap-x-3">
                                <div class="w-10 h-10 rounded-2xl flex items-center justify-center" 
                                     style="background-color: ${station.color}20; color: ${station.color}">
                                    <i class="fa-solid fa-broadcast-tower text-xl"></i>
                                </div>
                                <div>
                                    <div class="font-semibold text-lg leading-none">${station.name}</div>
                                    <div class="text-sm text-zinc-400 station-frequency mt-1">${station.frequency} FM</div>
                                </div>
                            </div>
                            
                            ${isActive ? `
                                <div class="flex items-center">
                                    <div class="px-2.5 py-1 bg-emerald-500/10 text-emerald-400 text-xs font-medium rounded-2xl flex items-center gap-x-1">
                                        <div class="w-1.5 h-1.5 bg-emerald-400 rounded-full animate-pulse"></div>
                                        <span class="text-[10px]">LIVE</span>
                                    </div>
                                </div>
                            ` : ''}
                        </div>
                        
                        <div class="flex items-center justify-between">
                            <div>
                                <span class="inline-block px-3 py-1 text-xs font-medium rounded-2xl bg-zinc-800 text-zinc-300">
                                    ${station.genre}
                                </span>
                            </div>
                            <div class="text-xs text-zinc-500">
                                ${station.location}
                            </div>
                        </div>
                    </div>
                `;
                
                grid.innerHTML += cardHTML;
            });
        }

        // Render Genre Filters
        function renderGenreFilters() {
            const container = document.getElementById('genre-filters');
            const genres = [...new Set(stations.map(s => s.genre))];
            
            container.innerHTML = `
                <button onclick="filterByGenre('all')" 
                        class="px-4 py-1.5 text-sm rounded-3xl bg-indigo-600 hover:bg-indigo-500 transition-colors font-medium">
                    All
                </button>
            `;
            
            genres.forEach(genre => {
                const button = document.createElement('button');
                button.className = `px-4 py-1.5 text-sm rounded-3xl bg-zinc-900 hover:bg-zinc-800 border border-zinc-700 transition-colors font-medium`;
                button.textContent = genre;
                button.onclick = () => filterByGenre(genre);
                container.appendChild(button);
            });
        }

        // Filter stations by genre
        function filterByGenre(genre) {
            const grid = document.getElementById('stations-grid');
            let filtered = stations;
            
            if (genre !== 'all') {
                filtered = stations.filter(station => station.genre === genre);
            }
            
            // Apply search filter if there's text
            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            if (searchTerm) {
                filtered = filtered.filter(station => 
                    station.name.toLowerCase().includes(searchTerm) ||
                    station.genre.toLowerCase().includes(searchTerm) ||
                    station.location.toLowerCase().includes(searchTerm)
                );
            }
            
            renderStations(filtered);
        }

        // Search functionality
        function setupSearch() {
            const searchInput = document.getElementById('search-input');
            
            searchInput.addEventListener('input', () => {
                const term = searchInput.value.toLowerCase().trim();
                
                let filtered = stations;
                
                if (term) {
                    filtered = stations.filter(station => 
                        station.name.toLowerCase().includes(term) ||
                        station.genre.toLowerCase().includes(term) ||
                        station.location.toLowerCase().includes(term)
                    );
                }
                
                renderStations(filtered);
            });
        }

        // Play a station
        function playStation(stationId) {
            const station = stations.find(s => s.id === stationId);
            if (!station) return;

            // Stop current audio if playing
            if (audio && !audio.paused) {
                audio.pause();
            }

            currentStation = station;

            // Update main player UI
            document.getElementById('player-station-name').textContent = station.name;
            document.getElementById('player-frequency').textContent = `${station.frequency} FM`;
            document.getElementById('player-genre').textContent = station.genre;
            document.getElementById('player-location').innerHTML = `
                <i class="fa-solid fa-globe mr-1.5"></i>
                <span>${station.location}</span>
            `;

            // Set audio source
            audio.src = station.stream;
            audio.volume = document.getElementById('volume-slider').value / 100;

            // Try to play
            const playPromise = audio.play();
            
            if (playPromise !== undefined) {
                playPromise.then(() => {
                    isPlaying = true;
                    updatePlayButton();
                    updateActiveStation();
                }).catch(error => {
                    console.error("Playback failed:", error);
                    alert("Playback failed. This might be due to browser restrictions or stream issues.");
                    isPlaying = false;
                    updatePlayButton();
                });
            }

            updateActiveStation();
        }

        // Update active station in grid
        function updateActiveStation() {
            const cards = document.querySelectorAll('.station-card');
            
            cards.forEach(card => {
                card.classList.remove('active', 'border-indigo-500');
                card.classList.add('border-zinc-800');
                
                // Check if this card is the current station
                const stationName = card.querySelector('.font-semibold').textContent;
                if (currentStation && stationName === currentStation.name) {
                    card.classList.add('active', 'border-indigo-500');
                    card.classList.remove('border-zinc-800');
                }
            });
        }

        // Toggle play/pause
        function togglePlay() {
            if (!currentStation) {
                // Play first station if none selected
                playStation(stations[0].id);
                return;
            }

            if (audio.paused) {
                audio.play().then(() => {
                    isPlaying = true;
                    updatePlayButton();
                }).catch(err => {
                    console.error(err);
                });
            } else {
                audio.pause();
                isPlaying = false;
                updatePlayButton();
            }
        }

        // Update play button icon
        function updatePlayButton() {
            const playIcon = document.getElementById('play-icon');
            
            if (isPlaying) {
                playIcon.classList.remove('fa-play');
                playIcon.classList.add('fa-pause');
            } else {
                playIcon.classList.remove('fa-pause');
                playIcon.classList.add('fa-play');
            }
        }

        // Stop radio
        function stopRadio() {
            if (audio) {
                audio.pause();
                audio.currentTime = 0;
            }
            isPlaying = false;
            updatePlayButton();
            stopVisualizer();
            
            // Reset player UI
            document.getElementById('player-station-name').textContent = "Select a station";
            document.getElementById('player-frequency').textContent = "—";
            document.getElementById('player-genre').textContent = "—";
            document.getElementById('player-location').innerHTML = `<i class="fa-solid fa-globe"></i> <span>—</span>`;
            
            // Remove active states
            document.querySelectorAll('.station-card').forEach(card => {
                card.classList.remove('active', 'border-indigo-500');
                card.classList.add('border-zinc-800');
            });
            
            currentStation = null;
        }

        // Play random station
        function playRandomStation() {
            const randomIndex = Math.floor(Math.random() * stations.length);
            playStation(stations[randomIndex].id);
        }

        // Audio Visualizer
        function setupVisualizer() {
            const visualizerContainer = document.getElementById('visualizer');
            visualizerContainer.innerHTML = '';
            
            // Create 12 bars
            for (let i = 0; i < 12; i++) {
                const bar = document.createElement('div');
                bar.className = `bar w-[5px] bg-indigo-400 rounded-full`;
                bar.style.height = `${Math.random() * 20 + 8}px`;
                visualizerContainer.appendChild(bar);
            }
        }

        function startVisualizer() {
            const visualizerContainer = document.getElementById('visualizer');
            const bars = visualizerContainer.children;
            
            if (!audioContext) {
                try {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    analyser = audioContext.createAnalyser();
                    analyser.fftSize = 64;
                    
                    const source = audioContext.createMediaElementSource(audio);
                    source.connect(analyser);
                    analyser.connect(audioContext.destination);
                } catch (e) {
                    console.log("Visualizer not supported");
                    return;
                }
            }

            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);

            function animate() {
                if (!isPlaying || !analyser) {
                    stopVisualizer();
                    return;
                }
                
                analyser.getByteFrequencyData(dataArray);
                
                for (let i = 0; i < bars.length; i++) {
                    const bar = bars[i];
                    const index = Math.floor(i * (bufferLength / bars.length));
                    const value = dataArray[index];
                    
                    const height = Math.max(8, (value / 255) * 55);
                    bar.style.height = `${height}px`;
                    
                    // Add some variation
                    if (Math.random() > 0.8) {
                        bar.style.opacity = 0.7 + Math.random() * 0.3;
                    }
                }
                
                animationFrame = requestAnimationFrame(animate);
            }
            
            animate();
        }

        function stopVisualizer() {
            if (animationFrame) {
                cancelAnimationFrame(animationFrame);
                animationFrame = null;
            }
            
            const visualizerContainer = document.getElementById('visualizer');
            const bars = visualizerContainer.children;
            
            for (let i = 0; i < bars.length; i++) {
                bars[i].style.height = `${Math.random() * 20 + 8}px`;
                bars[i].style.opacity = '1';
            }
        }

        // Filter stations
        function filterStations(term) {
            const filtered = stations.filter(station => 
                station.name.toLowerCase().includes(term) ||
                station.genre.toLowerCase().includes(term) ||
                station.location.toLowerCase().includes(term)
            );
            renderStations(filtered);
        }

        // Keyboard shortcuts
        function setupKeyboardShortcuts() {
            document.addEventListener('keydown', (e) => {
                if (e.key === ' ' || e.key === 'Spacebar') {
                    e.preventDefault();
                    togglePlay();
                }
                
                if (e.key.toLowerCase() === 'r') {
                    playRandomStation();
                }
                
                if (e.key === 'Escape') {
                    stopRadio();
                }
            });
        }

        // Update station count
        function updateStationCount() {
            document.getElementById('station-count').textContent = `${stations.length} stations`;
        }

        // Initialize everything
        function initializeRadio() {
            initializeTailwind();
            
            // Initialize audio
            initAudio();
            
            // Render UI
            renderStations();
            renderGenreFilters();
            setupSearch();
            setupVisualizer();
            setupKeyboardShortcuts();
            updateStationCount();
            
            // Set initial volume
            document.getElementById('volume-value').textContent = '80';
            
            // Auto-select first station (but don't autoplay due to browser policies)
            // We can highlight it instead
            setTimeout(() => {
                const firstCard = document.querySelector('.station-card');
                if (firstCard) {
                    firstCard.style.transition = 'all 0.3s ease';
                }
            }, 500);

            // Bonus: Show a welcome toast
